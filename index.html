<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLMAP Point Cloud Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 15px 25px;
            border-radius: 8px; color: white; z-index: 10;
        }
        input[type="file"] { margin-top: 10px; color: #ccc; }
        #status { margin-top: 10px; font-size: 13px; color: #00ffcc; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="ui-container">
        <h3 style="margin: 0 0 10px 0;">COLMAP PLY Viewer</h3>
        <label for="file-input">Choose COLMAP .ply file:</label><br>
        <input type="file" id="file-input" accept=".ply">
        <div id="status">Ready.</div>
    </div>
    
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, currentModel;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        document.getElementById('file-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Loading points into browser... (May take a while for dense clouds)";

            const fileUrl = URL.createObjectURL(file);
            const loader = new PLYLoader();

            loader.load(fileUrl, function (geometry) {
                statusDiv.innerText = "Rendering point cloud...";

                if (currentModel) scene.remove(currentModel);

                // --- COLMAP SPECIFIC CONFIGURATION ---
                // 1. We use PointsMaterial instead of MeshMaterial
                // 2. size: adjust this if your points look too blocky or too sparse
                // 3. vertexColors: true ensures we see the COLMAP RGB capture
                const pointMaterial = new THREE.PointsMaterial({
                    size: 0.02, 
                    vertexColors: true,
                    sizeAttenuation: true 
                });

                // Render as a point cloud
                currentModel = new THREE.Points(geometry, pointMaterial);

                // Center the cloud and frame the camera
                geometry.computeBoundingBox();
                geometry.computeBoundingSphere();
                geometry.center();
                
                const radius = geometry.boundingSphere.radius;
                camera.position.set(0, 0, radius * 1.5);
                controls.target.set(0, 0, 0);

                scene.add(currentModel);
                
                // Add point count to the success message
                const pointCount = geometry.attributes.position.count.toLocaleString();
                statusDiv.innerText = `Success: Loaded ${pointCount} points!`;
                
                URL.revokeObjectURL(fileUrl);
            }, undefined, function (error) {
                console.error(error);
                statusDiv.innerText = "Error parsing COLMAP file.";
            });
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
